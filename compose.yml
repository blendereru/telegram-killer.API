services:
  telegram-killer-api:
    build:
      context: ./telegram-killer.API
    container_name: telegram-killer-api
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=postgres;Port=5432;Database=telegramkiller;Username=postgres;Password=YOUR_PASSWORD
      - Seq__ServerUrl=http://seq:5341
    depends_on:
      postgres:
        condition: service_healthy
      seq:
        condition: service_started
    networks:
      - telegram-killer-network

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    environment:
      - POSTGRES_DB=telegramkiller
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=YOUR_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - telegram-killer-network

  seq:
    image: datalust/seq:latest
    container_name: seq
    environment:
      - ACCEPT_EULA=Y
      - SEQ_FIRSTRUN_ADMINPASSWORD=YOUR_PASSWORD
    ports:
      - "5341:5341"
      - "8082:80"
    volumes:
      - seq-data:/data
    networks:
      - telegram-killer-network
  
  asyncapi-docs:
    image: asyncapi/cli:latest
    container_name: asyncapi-docs
    working_dir: /app
    volumes:
      - ./docs:/app
      - ./telegram-killer.API/wwwroot/docs:/output
    command: >
      generate fromTemplate /app/asyncapi.yaml
      @asyncapi/html-template
      -o /output

volumes:
  postgres-data:
  seq-data:

networks:
  telegram-killer-network:
    driver: bridge