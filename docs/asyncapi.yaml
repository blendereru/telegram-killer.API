asyncapi: '2.6.0'
info:
  title: ChatHub API
  version: '2.1.0'
  description: |
    Real-time chat API powered by ASP.NET Core SignalR over WebSockets.

    ## Authentication
    All connections must carry a valid JWT bearer token. Connections that
    arrive without a resolved UserIdentifier are immediately aborted by the server.

    ## Connection Lifecycle
    - OnConnectedAsync: Validates UserIdentifier; missing aborts connection.
    - Active: Client may invoke JoinChat, LeaveChat, SendMessage, MarkAsRead.
    - OnDisconnectedAsync: Logs normal or error-caused disconnection.

servers:
  development:
    url: ws://localhost:8080/hub/chat
    protocol: ws
    security:
      - bearerAuth: []

channels:

  chat/joinChat:
    publish:
      operationId: joinChat
      summary: Join a chat group
      message:
        $ref: '#/components/messages/JoinChatRequest'

  chat/leaveChat:
    publish:
      operationId: leaveChat
      summary: Leave a chat group
      message:
        $ref: '#/components/messages/LeaveChatRequest'

  chat/sendMessage:
    publish:
      operationId: sendMessage
      summary: Send a message to a chat group
      message:
        $ref: '#/components/messages/SendMessageRequest'

  chat/markAsRead:
    publish:
      operationId: markAsRead
      summary: Mark a message as read
      message:
        $ref: '#/components/messages/MarkAsReadRequest'

  chat/receiveMessage:
    subscribe:
      operationId: receiveMessage
      summary: Receive a message from a chat group
      message:
        $ref: '#/components/messages/ReceiveMessageEvent'

  chat/messageRead:
    subscribe:
      operationId: messageRead
      summary: Receive notification that a message was read
      message:
        $ref: '#/components/messages/MessageReadEvent'

components:

  messages:

    JoinChatRequest:
      name: JoinChat
      contentType: application/json
      payload:
        $ref: '#/components/schemas/JoinChatPayload'

    LeaveChatRequest:
      name: LeaveChat
      contentType: application/json
      payload:
        $ref: '#/components/schemas/LeaveChatPayload'

    SendMessageRequest:
      name: SendMessage
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SendMessagePayload'

    MarkAsReadRequest:
      name: MarkAsRead
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MarkAsReadPayload'

    ReceiveMessageEvent:
      name: ReceiveMessage
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReceiveMessagePayload'

    MessageReadEvent:
      name: MessageRead
      contentType: application/json
      payload:
        $ref: '#/components/schemas/MessageReadPayload'

  schemas:

    JoinChatPayload:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: string
          format: uuid

    LeaveChatPayload:
      type: object
      required: [chatId]
      properties:
        chatId:
          type: string
          format: uuid

    SendMessagePayload:
      type: object
      required: [chatId, content]
      properties:
        chatId:
          type: string
          format: uuid
        content:
          type: string
          minLength: 1

    MarkAsReadPayload:
      type: object
      required: [chatId, messageId]
      properties:
        chatId:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid

    ReceiveMessagePayload:
      type: object
      required:
        - id
        - chatId
        - senderId
        - content
        - sentAt
      properties:
        id:
          type: string
          format: uuid
        chatId:
          type: string
          format: uuid
        senderId:
          type: string
          format: uuid
        content:
          type: string
        sentAt:
          type: string
          format: date-time

    MessageReadPayload:
      type: object
      required:
        - chatId
        - messageId
        - userId
        - readAt
      properties:
        chatId:
          type: string
          format: uuid
        messageId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        readAt:
          type: string
          format: date-time

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT