asyncapi: '2.6.0'
info:
  title: ChatHub API
  version: '2.0.0'
  description: |
    Real-time chat API powered by ASP.NET Core SignalR over WebSockets.

    ## Authentication
    All connections must carry a valid JWT bearer token. Connections that
    arrive without a resolved UserIdentifier are immediately aborted by the
    server (Context.Abort()).

    ## Connection Lifecycle
    - OnConnectedAsync: Server validates UserIdentifier; missing aborts connection.
    - Active: Client may invoke JoinChat or SendMessage; server pushes ReceiveMessage.
    - OnDisconnectedAsync: Server logs normal or error-caused disconnection.

servers:
  development:
    url: ws://localhost:8080/hub/chat
    protocol: ws
    description: Local development ChatHub SignalR endpoint (WS)
    security:
      - bearerAuth: []

channels:
  chat/joinChat:
    description: |
      Client invokes this channel to join a chat group. Maps directly to
      `JoinChat(string chatId)` hub method.
    publish:
      operationId: joinChat
      summary: Join a chat group
      tags:
        - name: group
      message:
        $ref: '#/components/messages/JoinChatRequest'

  chat/sendMessage:
    description: |
      Client invokes this channel to dispatch a message to a chat group.
      Maps to `SendMessage(string chatId, string content)` hub method.
      The caller's UserIdentifier is resolved server-side.
    publish:
      operationId: sendMessage
      summary: Send a message to a chat group
      tags:
        - name: messaging
      message:
        $ref: '#/components/messages/SendMessageRequest'

  chat/receiveMessage:
    description: |
      Server pushes this event to all members of a chat group when a message
      is sent via `SendMessage`.
    subscribe:
      operationId: receiveMessage
      summary: Receive a message from a chat group
      tags:
        - name: messaging
      message:
        $ref: '#/components/messages/ReceiveMessageEvent'

components:
  messages:
    JoinChatRequest:
      name: JoinChat
      title: Join Chat Request
      summary: Payload the client sends to join a chat group
      contentType: application/json
      payload:
        $ref: '#/components/schemas/JoinChatPayload'
      examples:
        - name: JoinGeneralChat
          summary: Join a chat group
          payload:
            chatId: "d4f1a2b3-1000-0000-0000-000000000001"

    SendMessageRequest:
      name: SendMessage
      title: Send Message Request
      summary: Payload the client sends when invoking the SendMessage hub method
      contentType: application/json
      payload:
        $ref: '#/components/schemas/SendMessagePayload'
      examples:
        - name: TextMessage
          summary: Send a text message to a chat group
          payload:
            chatId: "d4f1a2b3-1000-0000-0000-000000000001"
            content: "Hello everyone!"

    ReceiveMessageEvent:
      name: ReceiveMessage
      title: Receive Message Event
      summary: Payload the server pushes to the chat group
      contentType: application/json
      payload:
        $ref: '#/components/schemas/ReceiveMessagePayload'
      examples:
        - name: IncomingMessage
          summary: Message delivered to the chat group
          payload:
            id: "f1a2b3c4-0000-0000-0000-000000000001"
            chatId: "d4f1a2b3-1000-0000-0000-000000000001"
            senderId: "d4f1a2b3-0000-0000-0000-000000000001"
            content: "Hello everyone!"
            sentAt: "2026-03-09T12:00:00Z"

  schemas:
    JoinChatPayload:
      type: object
      required:
        - chatId
      additionalProperties: false
      properties:
        chatId:
          type: string
          minLength: 1
          description: The chat group identifier to join (GUID).
          example: "d4f1a2b3-1000-0000-0000-000000000001"

    SendMessagePayload:
      type: object
      required:
        - chatId
        - content
      additionalProperties: false
      properties:
        chatId:
          type: string
          minLength: 1
          description: The chat group identifier (GUID) to send the message to.
          example: "d4f1a2b3-1000-0000-0000-000000000001"
        content:
          type: string
          minLength: 1
          description: The plain-text content of the message.
          example: "Hello everyone!"

    ReceiveMessagePayload:
      type: object
      required:
        - id
        - chatId
        - senderId
        - content
        - sentAt
      additionalProperties: false
      properties:
        id:
          type: string
          description: Unique identifier of the message.
          example: "f1a2b3c4-0000-0000-0000-000000000001"
        chatId:
          type: string
          description: The chat group identifier.
          example: "d4f1a2b3-1000-0000-0000-000000000001"
        senderId:
          type: string
          description: The sender's UserIdentifier resolved server-side.
          example: "d4f1a2b3-0000-0000-0000-000000000001"
        content:
          type: string
          description: The plain-text message content.
          example: "Hello everyone!"
        sentAt:
          type: string
          format: date-time
          description: UTC timestamp when the message was sent.
          example: "2026-03-09T12:00:00Z"

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Standard JWT bearer token. Connections without a resolved UserIdentifier
        are aborted immediately in OnConnectedAsync.